{% extends "base.html" %}
{% block title %}Nowy pokój — Koloseum{% endblock %}
{% block page_title %}Nowy pokój{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto">
  <div class="card">
    <div class="card-header">
      <h2><i class="fas fa-plus-circle" style="color:var(--primary);margin-right:8px"></i>Utwórz pokój</h2>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Nazwa pokoju *</label>
          <input type="text" name="name" class="form-control" placeholder="np. Informatyka 2024/25"
                 required maxlength="128" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Opis (opcjonalny)</label>
          <textarea name="description" class="form-control" rows="3"
                    placeholder="Krótki opis pokoju…"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <a href="{{ url_for('rooms.list_rooms') }}" class="btn btn-ghost">Anuluj</a>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-check"></i> Utwórz pokój
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
