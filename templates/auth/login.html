<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — Koloseum</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏛️</div>
      <span>Koloseum</span>
    </div>
    <h1>Zaloguj się</h1>
    <p class="subtitle">Platforma do zarządzania terminami kolokwiów</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email lub nazwa użytkownika</label>
        <input type="text" name="identifier" class="form-control" placeholder="jan@przykład.pl" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Hasło</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember" style="font-size:.85rem;cursor:pointer">Zapamiętaj mnie</label>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:10px">
        <i class="fas fa-sign-in-alt"></i> Zaloguj się
      </button>
    </form>

    <div class="auth-divider">lub</div>

    <a href="{{ url_for('auth.login_filevault') }}" class="btn btn-secondary w-full" style="justify-content:center;padding:10px">
      <i class="fas fa-hdd"></i> Zaloguj przez FileVault
    </a>

    <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-muted)">
      Nie masz konta? <a href="{{ url_for('auth.register') }}">Zarejestruj się</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
